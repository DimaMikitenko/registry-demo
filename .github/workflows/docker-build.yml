name: Docker Build

on:
  push:

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/registry-demo:1.0-${{ github.sha }} .

      - name: Push Image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/registry-demo:1.0-${{ github.sha }}